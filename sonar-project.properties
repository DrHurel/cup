sonar.host.url=https://sonarcloud.io
sonar.organization=drhurel
sonar.projectKey=DrHurel_cup
sonar.projectName=cup

# Source layout
sonar.sources=.
sonar.exclusions=**/*_test.go,build/**,devtools/**,docker/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Go coverage (produced by `go test -coverprofile=coverage.out`)
sonar.go.coverage.reportPaths=coverage.out

sonar.sourceEncoding=UTF-8
